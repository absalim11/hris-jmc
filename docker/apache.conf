<VirtualHost *:80>
    DocumentRoot /var/www/html/backend/public
    
    # Backend (API)
    <Directory /var/www/html/backend/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Frontend (SPA)
    Alias /app /var/www/html/frontend/app
    Alias /assets /var/www/html/frontend/assets
    Alias /core /var/www/html/frontend/core
    Alias /components /var/www/html/frontend/components
    
    <Directory /var/www/html/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
